<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Redirecting…</title>
<script>
  // GitHub Pages can't serve /user-study/3 directly (no such file).
  // Rewrite it to /user-study/?/3 — the main page's inline script
  // decodes that back into /user-study/3 via history.replaceState
  // before anything else runs, so deep links work.
  (function () {
    var pathSegmentsToKeep = 1;           // keep "/user-study" (repo name)
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.hostname +
      (l.port ? ':' + l.port : '') +
      l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') +
      '/?/' +
      l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/')
        .replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  })();
</script>
</head>
<body></body>
</html>
